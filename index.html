<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Multistream Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Écran de sélection -->
    <section id="selection-screen">
        <header>
            <h1>Twitch Multistream Viewer</h1>
            <p class="subtitle">Regardez jusqu'à 4 streams Twitch simultanément</p>
        </header>

        <div class="add-streamer">
            <input
                type="text"
                id="streamer-input"
                placeholder="Pseudo Twitch (ex: samueletienne)"
                autocomplete="off"
            >
            <button id="add-button">Ajouter</button>
        </div>

        <p id="error-message" class="error hidden"></p>

        <div class="selected-list">
            <h2>Sélection (<span id="counter">0</span>/4)</h2>
            <ul id="streamers-list"></ul>
        </div>

        <button id="start-button" disabled>Lancer le multistream</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
