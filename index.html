<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Multistream Viewer</title>

    <!-- Favicon (emoji TV en SVG inline) -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

    <!-- Meta tags pour le partage social (Open Graph) -->
    <meta property="og:title" content="Twitch Multistream Viewer">
    <meta property="og:description" content="Watch up to 4 Twitch streams simultaneously with focused stream selection.">
    <meta property="og:type" content="website">
    <meta name="description" content="Watch up to 4 Twitch streams simultaneously. Built with vanilla HTML, CSS, and JavaScript.">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- === Écran de sélection === -->
    <section id="selection-screen">
        <header>
            <h1>Twitch Multistream Viewer</h1>
            <p class="subtitle">Regardez jusqu'à 4 streams Twitch simultanément</p>
        </header>

        <div class="add-streamer">
            <input
                type="text"
                id="streamer-input"
                placeholder="Pseudo Twitch (ex: samueletienne)"
                autocomplete="off"
            >
            <button id="add-button">Ajouter</button>
        </div>

        <p id="error-message" class="error hidden"></p>

        <div class="selected-list">
            <h2>Sélection (<span id="counter">0</span>/4)</h2>
            <ul id="streamers-list"></ul>
        </div>

        <button id="start-button" disabled>Lancer le multistream</button>
    </section>

    <!-- === Écran de visualisation === -->
    <section id="viewer-screen" class="hidden">
       <div class="viewer-header">
            <button id="back-button">← Retour à la sélection</button>
            <span class="viewer-info">Cliquez sur un stream pour activer son audio</span>
        </div>
        <div id="streams-grid"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
